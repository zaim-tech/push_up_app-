name: Build Flet App

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: 3.12
  PYTHONUTF8: 1
  FLET_CLI_NO_RICH_OUTPUT: 1

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            runner: ubuntu-latest
            build_cmd: "flet build linux"
            artifact_path: build/linux
            needs_linux_deps: true

          - name: macos
            runner: macos-26
            build_cmd: "flet build macos"
            artifact_path: build/macos
            needs_linux_deps: false

          - name: windows
            runner: windows-latest
            build_cmd: "flet build windows"
            artifact_path: build/windows
            needs_linux_deps: false

          - name: apk
            runner: ubuntu-latest
            build_cmd: "flet build apk"
            artifact_path: build/apk
            needs_linux_deps: false

          - name: aab
            runner: ubuntu-latest
            build_cmd: "flet build aab"
            artifact_path: build/aab
            needs_linux_deps: false

          - name: web
            runner: ubuntu-latest
            build_cmd: "flet build web"
            artifact_path: build/web
            needs_linux_deps: false

          - name: ipa
            runner: macos-26
            build_cmd: "flet build ipa"
            artifact_path: build/ipa
            needs_linux_deps: false

          - name: ios-simulator
            runner: macos-26
            build_cmd: "flet build ios-simulator"
            artifact_path: build/ios-simulator
            needs_linux_deps: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.needs_linux_deps
        shell: bash
        run: |
          sudo apt update
          LINUX_DEPS="$(uv run python -c 'from flet.utils.linux_deps import linux_dependencies; print(" ".join(linux_dependencies))')"
          sudo apt-get install -y --no-install-recommends $LINUX_DEPS

      # ======================================================
      # ✅ INJECT PROGUARD RULES (Fix for ML Kit + R8)
      # ======================================================
      - name: Inject proguard-rules.pro (ML Kit R8 fix)
        if: matrix.name == 'apk' || matrix.name == 'aab'
        shell: bash
        run: |
          echo "Waiting for Flet to create the Flutter project structure..."
          for i in {1..40}; do
            if [ -d "build/flutter/android/app" ]; then
              echo "✅ Found build/flutter/android/app directory"
              break
            fi
            echo "Waiting... ($i/40)"
            sleep 3
          done

          mkdir -p build/flutter/android/app
          cat > build/flutter/android/app/proguard-rules.pro << 'EOF'
          # Fix for google_mlkit_text_recognition missing classes during R8
          -dontwarn com.google.mlkit.vision.text.chinese.**
          -dontwarn com.google.mlkit.vision.text.devanagari.**
          -dontwarn com.google.mlkit.vision.text.japanese.**
          -dontwarn com.google.mlkit.vision.text.korean.**
          -dontwarn com.google.mlkit.**

          # Keep ML Kit classes that are loaded via reflection
          -keep class com.google.mlkit.** { *; }
          -keep class com.google_mlkit_** { *; }
          EOF
          echo "✅ Successfully injected proguard-rules.pro"

      - name: Build app
        shell: bash
        run: |
          uv run ${{ matrix.build_cmd }} --yes --verbose

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build-artifact
          path: ${{ matrix.artifact_path }}
          
